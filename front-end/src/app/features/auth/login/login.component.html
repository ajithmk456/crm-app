<div class="login-wrapper">
    <div class="login-card" [class.animate]="animate">

        <h1 class="title">MUKUNDHA ASSOCIATES</h1>
        <p class="subtitle">Business Management Portal</p>

        <!-- ===== STEP 1: EMAIL INPUT ===== -->
        <form *ngIf="step === 'email'" [formGroup]="emailForm" (ngSubmit)="checkEmail()">
            <div class="step-indicator">
                <span class="step-label">Step</span>
                <span class="step-number">1</span>
                <span class="step-title">Enter Email</span>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input 
                    formControlName="email" 
                    type="email" 
                    placeholder="Enter your email address"
                    [disabled]="loading" />
            </div>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <button 
                type="submit" 
                class="btn-login"
                [disabled]="loading || emailForm.invalid">
                <span *ngIf="!loading">Continue</span>
                <span *ngIf="loading" class="loader">Checking...</span>
            </button>
        </form>

        <!-- ===== STEP 2: PASSWORD LOGIN ===== -->
        <form *ngIf="step === 'password'" [formGroup]="passwordForm" (ngSubmit)="login()">
            <div class="step-indicator with-back">
                <button type="button" class="back-btn" (click)="goBack()" [disabled]="loading">← Back</button>
                <div class="step-meta">
                    <span class="step-label">Step</span>
                    <span class="step-number">2</span>
                    <span class="step-title">Sign In</span>
                </div>
            </div>

            <div class="user-info">
                <p>{{ userEmail }}</p>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input 
                        formControlName="password" 
                        [type]="showPassword ? 'text' : 'password'" 
                        placeholder="Enter your password"
                        [disabled]="loading" />
                    <span class="toggle-icon" (click)="togglePassword()">
                        <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </span>
                </div>
            </div>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <button 
                type="submit" 
                class="btn-login"
                [disabled]="loading || passwordForm.invalid">
                <span *ngIf="!loading">Sign In</span>
                <span *ngIf="loading" class="loader">Signing in...</span>
            </button>

            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>
        </form>

        <!-- ===== STEP 3: SET PASSWORD ===== -->
        <form *ngIf="step === 'set-password'" [formGroup]="setPasswordForm" (ngSubmit)="setPassword()">
            <div class="step-indicator with-back">
                <button type="button" class="back-btn" (click)="goBack()" [disabled]="loading">← Back</button>
                <div class="step-meta">
                    <span class="step-label">Step</span>
                    <span class="step-number">3</span>
                    <span class="step-title">Create Password</span>
                </div>
            </div>

            <div class="user-info">
                <p>{{ userEmail }}</p>
                <p class="info-text">This is your first time? Create a password to continue.</p>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input 
                        formControlName="password" 
                        [type]="showPassword ? 'text' : 'password'" 
                        placeholder="Create a password (min. 5 characters)"
                        [disabled]="loading" />
                    <span class="toggle-icon" (click)="togglePassword()">
                        <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </span>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input 
                        formControlName="confirmPassword" 
                        [type]="showPassword ? 'text' : 'password'" 
                        placeholder="Confirm your password"
                        [disabled]="loading" />
                    <span class="toggle-icon" (click)="togglePassword()">
                        <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </span>
                </div>
            </div>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <button 
                type="submit" 
                class="btn-login"
                [disabled]="loading || setPasswordForm.invalid">
                <span *ngIf="!loading">Create Account</span>
                <span *ngIf="loading" class="loader">Creating account...</span>
            </button>
        </form>

    </div>
</div>
