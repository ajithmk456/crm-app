<div class="history-page">
  <div class="history-header">
    <div>
      <h2>Work History</h2>
      <p>Chronological activity timeline for client and task events.</p>
    </div>
  </div>

  <section class="summary-grid">
    <div class="summary-card">
      <span class="label">Total Tasks</span>
      <strong>{{ totalTasks }}</strong>
    </div>
    <div class="summary-card success">
      <span class="label">Completed Tasks</span>
      <strong>{{ completedTasks }}</strong>
    </div>
    <div class="summary-card warning">
      <span class="label">Pending Tasks</span>
      <strong>{{ pendingTasks }}</strong>
    </div>
    <div class="summary-card info">
      <span class="label">Last Activity</span>
      <strong>{{ lastActivityTime }}</strong>
    </div>
  </section>

  <div class="filters-card">
    <div class="filters">
      <label>
        <span>Client</span>
        <div class="input-wrap">
          <i class="fa-regular fa-user"></i>
          <select [(ngModel)]="selectedClientId" (change)="loadHistory()">
            <option value="">All Clients</option>
            <option *ngFor="let client of clients" [value]="client._id">{{ client.name }} ({{ client.mobile }})</option>
          </select>
        </div>
      </label>

      <label>
        <span>Task</span>
        <div class="input-wrap">
          <i class="fa-solid fa-list-check"></i>
          <select [(ngModel)]="selectedTaskId" (change)="loadHistory()">
            <option value="">All Tasks</option>
            <option *ngFor="let task of tasks" [value]="task._id">{{ task.title }}</option>
          </select>
        </div>
      </label>

      <label>
        <span>From Date</span>
        <div class="input-wrap">
          <i class="fa-regular fa-calendar"></i>
          <input type="date" [(ngModel)]="fromDate" (change)="loadHistory()">
        </div>
      </label>

      <label>
        <span>To Date</span>
        <div class="input-wrap">
          <i class="fa-regular fa-calendar-check"></i>
          <input type="date" [(ngModel)]="toDate" (change)="loadHistory()">
        </div>
      </label>

      <button type="button" class="reset-btn" (click)="resetFilters()">Reset</button>
    </div>
  </div>

  <div class="loading" *ngIf="isLoading">Loading history...</div>

  <div class="timeline" *ngIf="!isLoading">
    <div class="empty" *ngIf="!items.length">No activity found for selected filters.</div>

    <section class="timeline-group" *ngFor="let group of groupedTimeline">
      <div class="group-label">{{ group.label }}</div>
      <div class="group-items">
        <div class="timeline-line"></div>

        <app-timeline-item
          *ngFor="let item of group.items"
          [item]="item"
          [latest]="isLatest(item)"
          [expanded]="expandedId === item._id"
          [title]="getDisplayTitle(item)"
          [employeeLabel]="getEmployeeLabel(item)"
          [relativeTime]="formatRelativeTime(item.createdAt)"
          [exactTime]="formatExactTime(item.createdAt)"
          [iconClass]="getIconClass(item.type)"
          [colorClass]="getColorClass(item)"
          [metadata]="asKeyValues(item.metadata)"
          (toggle)="toggleExpanded(item._id)"
        ></app-timeline-item>
      </div>
    </section>
  </div>
</div>
